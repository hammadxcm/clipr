name: Issue URL Shortener

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  shorten:
    if: startsWith(github.event.issue.title, 'http')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:core
      - run: pnpm build:cli

      - name: Shorten URL
        id: shorten
        run: |
          URL="${{ github.event.issue.title }}"
          RESULT=$(node packages/cli/dist/index.js shorten "$URL" 2>&1)
          SLUG=$(echo "$RESULT" | tail -1 | xargs)
          echo "slug=$SLUG" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Commit urls.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add urls.json
          git commit -m "feat(urls): shorten ${{ steps.shorten.outputs.url }}"
          git push

      - name: Comment on issue
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Short URL created: **${{ steps.shorten.outputs.slug }}**\n\nTarget: ${{ steps.shorten.outputs.url }}`
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
