name: Bug Report
description: Report a bug in clipr
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run `clipr shorten ...`
        2. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `clipr --version`
      placeholder: "0.0.1"
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - "@clipr/core"
        - "clipr (CLI)"
        - "@clipr/worker"
        - "@clipr/web"
