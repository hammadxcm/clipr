name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Version & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      # Auto-create a patch changeset if none exists (skip for version bump commits)
      - name: Auto-create changeset
        run: |
          LAST_MSG=$(git log -1 --pretty=%s)
          if echo "$LAST_MSG" | grep -q "chore(release): version packages"; then
            echo "Version bump commit — skipping auto-changeset (publish will happen)"
            exit 0
          fi
          CHANGESETS=$(ls .changeset/*.md 2>/dev/null | grep -v README | wc -l | tr -d ' ')
          if [ "$CHANGESETS" = "0" ]; then
            echo "No changesets found. Creating auto patch changeset..."
            FILENAME=".changeset/auto-$(date +%s).md"
            printf '%s\n' '---' '"clipr-cli": patch' '"@clipr/core": patch' '---' '' "$LAST_MSG" > "$FILENAME"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .changeset/
            git commit -m "chore: auto-create patch changeset" || echo "No changes to commit"
            git push || echo "Nothing to push"
          fi

      - run: pnpm build:core
      - run: pnpm build:cli

      # Changesets action: creates "Version Packages" PR or publishes to npm
      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm release
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Create GitHub Release after npm publish
      - name: Create GitHub Release
        if: steps.changesets.outputs.published == 'true'
        run: |
          VERSION=$(cat packages/cli/package.json | grep '"version"' | head -1 | sed 's/.*"version": *"//;s/".*//')
          TAG="v${VERSION}"
          git tag "$TAG" || true
          git push origin "$TAG" || true
          gh release create "$TAG" --title "clipr $TAG" --generate-notes --latest || true
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      # Update Homebrew tap after npm publish
      - name: Update Homebrew Tap
        if: steps.changesets.outputs.published == 'true'
        run: |
          VERSION=$(cat packages/cli/package.json | grep '"version"' | head -1 | sed 's/.*"version": *"//;s/".*//')
          sleep 10
          SHA=$(npm view clipr-cli@${VERSION} dist.shasum 2>/dev/null || echo "")
          if [ -z "$SHA" ]; then
            echo "Could not get shasum for clipr-cli@${VERSION}, skipping Homebrew update"
            exit 0
          fi
          git clone https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/hammadxcm/homebrew-tap.git /tmp/homebrew-tap || exit 0
          mkdir -p /tmp/homebrew-tap/Formula
          cat > /tmp/homebrew-tap/Formula/clipr.rb << EOF
          class Clipr < Formula
            desc "A fast, git-friendly URL shortener"
            homepage "https://github.com/hammadxcm/clipr"
            url "https://registry.npmjs.org/clipr-cli/-/clipr-cli-${VERSION}.tgz"
            sha256 "${SHA}"
            license "MIT"
            depends_on "node@22"
            def install
              system "npm", "install", *std_npm_args
              bin.install_symlink Dir["\#{libexec}/bin/*"]
            end
            test do
              assert_match version.to_s, shell_output("\#{bin}/clipr --version")
            end
          end
          EOF
          cd /tmp/homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "clipr-cli ${VERSION}" || true
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
